<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MB实验室登陆</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #1a2a3a 0%, #0f1a24 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            position: relative;
            overflow-x: hidden;
        }

        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: rgba(80, 151, 73, 0.25);
            border-radius: 50%;
            animation: floatParticle 12s infinite linear;
            filter: blur(1px);
        }

        @keyframes floatParticle {
            0% {
                transform: translateY(100vh) translateX(0) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 0.6; }
            90% { opacity: 0.5; }
            100% {
                transform: translateY(-20vh) translateX(40px) rotate(360deg);
                opacity: 0;
            }
        }

        .verify-card {
            background: rgba(44, 62, 80, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 2.5rem 2rem;
            width: 90%;
            max-width: 460px;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(80, 151, 73, 0.2);
            z-index: 10;
            transition: transform 0.25s ease;
            border: 1px solid rgba(80, 151, 73, 0.5);
        }

        .verify-card:hover {
            transform: scale(1.01);
        }

        .logo {
            font-size: 3.2rem;
            font-weight: bold;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #e0f2e0, #a3d9a5);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .sub {
            color: #cbd5e6;
            font-size: 0.85rem;
            border-bottom: 1px dashed #509749;
            display: inline-block;
            padding-bottom: 6px;
            margin-bottom: 24px;
        }

        h2 {
            color: white;
            font-weight: 500;
            margin: 20px 0 12px;
            font-size: 1.7rem;
        }

        .lock-icon {
            font-size: 3rem;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
            margin-bottom: 10px;
        }

        .footer-note {
            margin-top: 28px;
            font-size: 0.7rem;
            color: #7f8c8d;
            letter-spacing: 0.5px;
        }

        .security-badge {
            position: fixed;
            bottom: 12px;
            left: 12px;
            font-size: 11px;
            color: rgba(255,255,255,0.2);
            z-index: 20;
            pointer-events: none;
        }

        /* ========== 密码输入区域 ========== */
        .password-input-group {
            margin: 25px 0 20px;
            text-align: left;
        }

        .password-label {
            display: block;
            color: #b0c4de;
            font-size: 0.85rem;
            margin-bottom: 8px;
            text-align: left;
        }

        .password-input-wrapper {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .password-input {
            flex: 1;
            background: #1e2e3b;
            border: 1px solid #3a5a6e;
            border-radius: 60px;
            padding: 14px 20px;
            color: white;
            font-size: 1rem;
            font-family: monospace;
            outline: none;
            transition: all 0.3s ease;
        }

        .password-input:focus {
            border-color: #509749;
            box-shadow: 0 0 8px rgba(80, 151, 73, 0.3);
        }

        .submit-btn {
            background: linear-gradient(135deg, #509749, #3d7335);
            border: none;
            border-radius: 60px;
            padding: 14px 28px;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            white-space: nowrap;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(80, 151, 73, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .error-message {
            color: #ff6b6b;
            font-size: 0.8rem;
            margin-top: 12px;
            min-height: 32px;
            text-align: center;
            transition: color 0.2s;
        }

        .attempt-count {
            color: #7f8c8d;
            font-size: 0.7rem;
            margin-top: 10px;
        }

        .hint-text {
            color: #5a7a8a;
            font-size: 0.7rem;
            margin-top: 15px;
            line-height: 1.5;
        }

        .role-badge {
            display: inline-block;
            background: rgba(80, 151, 73, 0.2);
            border: 1px solid #509749;
            border-radius: 30px;
            padding: 6px 18px;
            color: #b0e0b0;
            font-size: 0.75rem;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>

<div class="bg-particles" id="particles-zone"></div>
<div class="verify-card">
    <div class="password-input-group">
        <label class="password-label">请输入密码</label>
        <div class="password-input-wrapper">
            <input type="password" class="password-input" id="passwordInput" placeholder="管理员或用户密码" autocomplete="off">
            <button class="submit-btn" id="submitBtn">验证</button>
        </div>
        <div class="error-message" id="errorMsg"></div>
        <div class="attempt-count" id="attemptCount">剩余尝试次数：10</div>
    </div>
    <div class="footer-note">
        MB实验室 © 2026
    </div>
</div>

<script>
    (function() {
        "use strict";

        // ========== 双重密码配置 ==========
        // 管理员密码 (默认 1)
        const ADMIN_PASSWORD = "1";
        // 普通用户密码 (默认 SDeY@github_666)
        const USER_PASSWORD = "SDeY@github_666";

        // 验证通过后的跳转地址
        const ADMIN_TARGET_URL = "https://sdey666.github.io/mb/guanliyuan.html";    // 管理员后台
        const USER_TARGET_URL = "https://sdey666.github.io/mb/main.html";      // 用户页面

        // ========== 状态变量 ==========
        let attemptCount = 0;
        const MAX_ATTEMPTS = 10;
        let isLocked = false;

        // ========== DOM 引用 ==========
        const passwordInput = document.getElementById('passwordInput');
        const submitBtn = document.getElementById('submitBtn');
        const errorMsg = document.getElementById('errorMsg');
        const attemptSpan = document.getElementById('attemptCount');

        // ========== 辅助函数 ==========
        function updateAttemptDisplay() {
            const remaining = Math.max(0, MAX_ATTEMPTS - attemptCount);
            attemptSpan.textContent = `剩余尝试次数：${remaining}`;
            if (remaining === 0) {
                attemptSpan.style.color = '#ff6b6b';
            } else if (remaining <= 3) {
                attemptSpan.style.color = '#ffaa44';
            } else {
                attemptSpan.style.color = '#7f8c8d';
            }
        }

        function lockInputs() {
            isLocked = true;
            passwordInput.disabled = true;
            submitBtn.disabled = true;
            passwordInput.style.opacity = '0.6';
            submitBtn.style.opacity = '0.6';
        }

        function showError(text, isSuccess = false) {
            errorMsg.textContent = text;
            errorMsg.style.color = isSuccess ? '#509749' : '#ff6b6b';
        }

        // ========== 核心验证逻辑 (双重密码) ==========
        function verifyPassword() {
            if (isLocked) {
                showError('访问已锁定，请联系管理员');
                return;
            }

            if (attemptCount >= MAX_ATTEMPTS) {
                showError('已锁定');
                lockInputs();
                return;
            }

            const userPassword = passwordInput.value.trim();

            if (userPassword === '') {
                showError('请输入密码');
                passwordInput.focus();
                return;
            }

            // ---------- 双重密码比对 ----------
            let isAdmin = false;
            let isUser = false;

            if (userPassword === ADMIN_PASSWORD) {
                isAdmin = true;
            } else if (userPassword === USER_PASSWORD) {
                isUser = true;
            }

            if (isAdmin || isUser) {
                //密码正确
                const role = isAdmin ? '管理员' : '普通用户';
                showError(` ${role}验证成功，正在跳转...`, true);
                passwordInput.disabled = true;
                submitBtn.disabled = true;
                isLocked = true;

                const targetUrl = isAdmin ? ADMIN_TARGET_URL : USER_TARGET_URL;
                setTimeout(() => {
                    window.location.href = targetUrl;
                }, 500);
            } else {
                //密码错误
                attemptCount++;
                updateAttemptDisplay();

                const remaining = MAX_ATTEMPTS - attemptCount;
                if (remaining <= 0) {
                    showError('次数用尽，访问已锁定');
                    lockInputs();
                } else {
                    showError(`密码错误，还剩 ${remaining} 次机会`);
                    passwordInput.value = '';
                    passwordInput.focus();
                }
            }
        }

        // ========== 事件绑定 ==========
        submitBtn.addEventListener('click', verifyPassword);

        passwordInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                verifyPassword();
            }
        });

        passwordInput.focus();

        // ========== 初始化 ==========
        updateAttemptDisplay();

        // ========== 🛡️ 全面安全防护 ==========

        // 右键禁用
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            e.stopPropagation();
            return false;
        }, { passive: false, capture: true });
        document.oncontextmenu = function() { return false; };

        // 键盘快捷键拦截
        document.onkeydown = function(e) {
            const key = e.key;
            if (key === 'F12') {
                e.preventDefault();
                return false;
            }
            if (e.ctrlKey && e.shiftKey && (key === 'I' || key === 'J' || key === 'C' || key === 'K')) {
                e.preventDefault();
                return false;
            }
            if (e.ctrlKey && (key === 'u' || key === 'U' || key === 's' || key === 'S')) {
                e.preventDefault();
                return false;
            }
            return true;
        };

        // 禁用拖拽、选中
        document.addEventListener('dragstart', function(e) { e.preventDefault(); return false; });
        document.addEventListener('selectstart', function(e) { e.preventDefault(); return false; });

        // 移动端长按菜单禁用
        document.addEventListener('touchstart', function(e) {
            if (e.touches.length === 1) {
                let timer = setTimeout(function() { e.preventDefault(); }, 500);
                document.addEventListener('touchend', function clearTimer() {
                    clearTimeout(timer);
                    document.removeEventListener('touchend', clearTimer);
                }, { once: true });
                document.addEventListener('touchmove', function clearTimerMove() {
                    clearTimeout(timer);
                    document.removeEventListener('touchmove', clearTimerMove);
                }, { once: true });
            }
        }, { passive: false });

        // iframe 防嵌套
        if (window.self !== window.top) {
            try {
                window.top.location.href = window.location.href;
            } catch (e) {}
        }

        // 焦点恢复时强化右键防护
        window.addEventListener('focus', function() {
            document.oncontextmenu = function() { return false; };
            document.addEventListener('contextmenu', function(e) { e.preventDefault(); }, { capture: true });
        });

        // ========== 粒子背景 ==========
        function generateParticles() {
            const container = document.getElementById('particles-zone');
            if (!container) return;
            for (let i = 0; i < 60; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                const size = Math.random() * 6 + 2;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDuration = (Math.random() * 10 + 8) + 's';
                p.style.animationDelay = (Math.random() * 5) + 's';
                p.style.opacity = Math.random() * 0.5;
                container.appendChild(p);
            }
        }
        generateParticles();
    })();
</script>

</body>
</html>
