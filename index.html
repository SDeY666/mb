<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MB实验室 | 安全验证入口</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #1a2a3a 0%, #0f1a24 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            position: relative;
            overflow-x: hidden;
        }

        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: rgba(80, 151, 73, 0.25);
            border-radius: 50%;
            animation: floatParticle 12s infinite linear;
            filter: blur(1px);
        }

        @keyframes floatParticle {
            0% {
                transform: translateY(100vh) translateX(0) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 0.6; }
            90% { opacity: 0.5; }
            100% {
                transform: translateY(-20vh) translateX(40px) rotate(360deg);
                opacity: 0;
            }
        }

        .verify-card {
            background: rgba(44, 62, 80, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 2.5rem 2rem;
            width: 90%;
            max-width: 460px;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(80, 151, 73, 0.2);
            z-index: 10;
            transition: transform 0.25s ease;
            border: 1px solid rgba(80, 151, 73, 0.5);
        }

        .verify-card:hover {
            transform: scale(1.01);
        }

        .logo {
            font-size: 3.2rem;
            font-weight: bold;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #e0f2e0, #a3d9a5);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .sub {
            color: #cbd5e6;
            font-size: 0.85rem;
            border-bottom: 1px dashed #509749;
            display: inline-block;
            padding-bottom: 6px;
            margin-bottom: 24px;
        }

        h2 {
            color: white;
            font-weight: 500;
            margin: 20px 0 12px;
            font-size: 1.7rem;
        }

        .lock-icon {
            font-size: 3rem;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
            margin-bottom: 10px;
        }

        .footer-note {
            margin-top: 28px;
            font-size: 0.7rem;
            color: #7f8c8d;
            letter-spacing: 0.5px;
        }

        .security-badge {
            position: fixed;
            bottom: 12px;
            left: 12px;
            font-size: 11px;
            color: rgba(255,255,255,0.2);
            z-index: 20;
            pointer-events: none;
        }

        /* ========== 内嵌密码输入框样式 ========== */
        .password-input-group {
            margin: 25px 0 20px;
            text-align: left;
        }

        .password-label {
            display: block;
            color: #b0c4de;
            font-size: 0.85rem;
            margin-bottom: 8px;
            text-align: left;
        }

        .password-input-wrapper {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .password-input {
            flex: 1;
            background: #1e2e3b;
            border: 1px solid #3a5a6e;
            border-radius: 60px;
            padding: 14px 20px;
            color: white;
            font-size: 1rem;
            font-family: monospace;
            outline: none;
            transition: all 0.3s ease;
        }

        .password-input:focus {
            border-color: #509749;
            box-shadow: 0 0 8px rgba(80, 151, 73, 0.3);
        }

        .submit-btn {
            background: linear-gradient(135deg, #509749, #3d7335);
            border: none;
            border-radius: 60px;
            padding: 14px 28px;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(80, 151, 73, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .error-message {
            color: #ff6b6b;
            font-size: 0.8rem;
            margin-top: 12px;
            min-height: 32px;
            text-align: center;
        }

        .attempt-count {
            color: #7f8c8d;
            font-size: 0.7rem;
            margin-top: 10px;
        }

        .hint-text {
            color: #5a7a8a;
            font-size: 0.7rem;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="bg-particles" id="particles-zone"></div>

<div class="verify-card">
    <div class="logo">MB LAB</div>
    <div class="sub">安全验证</div>
    <h2>授权访问</h2>
    
    <!-- 内嵌密码输入框（替代浏览器弹窗） -->
    <div class="password-input-group">
        <label class="password-label">请输入访问密码</label>
        <div class="password-input-wrapper">
            <input type="password" class="password-input" id="passwordInput" placeholder="" autocomplete="off">
            <button class="submit-btn" id="submitBtn">验证</button>
        </div>
        <div class="error-message" id="errorMsg"></div>
        <div class="attempt-count" id="attemptCount">剩余尝试次数：10</div>
        <div class="hint-text">请联系管理员获取密码</div>
    </div>
    
    <div class="footer-note">
        MB实验室 © 2026
    </div>
</div>

<script>
    // ========== 右键防护（完整禁用） ==========
    document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        e.stopPropagation();
        return false;
    }, { passive: false, capture: true });

    window.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        return false;
    });

    document.oncontextmenu = function() { return false; };
    
    // ========== 键盘快捷键防护 ==========
    document.onkeydown = function(e) {
        const key = e.key;
        if (key === 'F12') {
            e.preventDefault();
            return false;
        }
        if (e.ctrlKey && e.shiftKey && (key === 'I' || key === 'J' || key === 'C')) {
            e.preventDefault();
            return false;
        }
        if (e.ctrlKey && (key === 'u' || key === 'U')) {
            e.preventDefault();
            return false;
        }
        if (e.ctrlKey && e.shiftKey && key === 'K') {
            e.preventDefault();
            return false;
        }
        if (e.ctrlKey && (key === 's' || key === 'S')) {
            e.preventDefault();
            return false;
        }
        // 支持回车键提交
        if (key === 'Enter') {
            const passwordInput = document.getElementById('passwordInput');
            if (document.activeElement === passwordInput) {
                e.preventDefault();
                verifyPassword();
            }
        }
        return true;
    };

    // 禁用拖拽和选中
    document.addEventListener('dragstart', function(e) { e.preventDefault(); return false; });
    document.addEventListener('selectstart', function(e) { e.preventDefault(); return false; });
    
    // 移动端长按菜单禁用
    document.addEventListener('touchstart', function(e) {
        if (e.touches.length === 1) {
            let timer;
            const longTouch = () => { e.preventDefault(); };
            const clearTimer = () => clearTimeout(timer);
            timer = setTimeout(longTouch, 500);
            document.addEventListener('touchend', clearTimer, { once: true });
            document.addEventListener('touchmove', clearTimer, { once: true });
        }
    });
    
    // ========== 密码验证配置 ==========
    const correctPassword = "20120315";
    const targetUrl = "https://sdey666.github.io/mb/main.html";
    
    let attemptCount = 0;
    const MAX_ATTEMPTS = 10;
    
    // 获取DOM元素
    const passwordInput = document.getElementById('passwordInput');
    const submitBtn = document.getElementById('submitBtn');
    const errorMsg = document.getElementById('errorMsg');
    const attemptCountSpan = document.getElementById('attemptCount');
    
    // 更新剩余次数显示
    function updateAttemptDisplay() {
        const remaining = MAX_ATTEMPTS - attemptCount;
        attemptCountSpan.textContent = `剩余尝试次数：${remaining}`;
        if (remaining <= 3 && remaining > 0) {
            attemptCountSpan.style.color = '#ffaa44';
        } else if (remaining === 0) {
            attemptCountSpan.style.color = '#ff6b6b';
        } else {
            attemptCountSpan.style.color = '#7f8c8d';
        }
    }
    
    // 验证密码函数
    function verifyPassword() {
        const userPassword = passwordInput.value;
        
        // 清空之前的错误信息样式
        errorMsg.style.color = '#ff6b6b';
        
        // 检查是否已锁定
        if (attemptCount >= MAX_ATTEMPTS) {
            errorMsg.innerHTML = '尝试次数过多，访问已锁定';
            passwordInput.disabled = true;
            submitBtn.disabled = true;
            return;
        }
        
        // 检查是否为空
        if (!userPassword) {
            errorMsg.innerHTML = '请输入密码';
            passwordInput.focus();
            return;
        }
        
        // 验证密码
        if (userPassword === correctPassword) {
            // 密码正确，显示成功提示并跳转
            errorMsg.style.color = '#509749';
            errorMsg.innerHTML = '✓ 验证成功，正在跳转...';
            passwordInput.disabled = true;
            submitBtn.disabled = true;
            
            setTimeout(() => {
                window.location.href = targetUrl;
            }, 500);
        } else {
            // 密码错误
            attemptCount++;
            updateAttemptDisplay();
            
            const remaining = MAX_ATTEMPTS - attemptCount;
            if (remaining === 0) {
                errorMsg.innerHTML = '❌ 密码错误次数已达上限，访问已锁定！';
                passwordInput.disabled = true;
                submitBtn.disabled = true;
            } else {
                errorMsg.innerHTML = `❌ 密码错误！还剩 ${remaining} 次尝试机会`;
                passwordInput.value = '';
                passwordInput.focus();
            }
        }
    }
    
    // 绑定验证事件
    submitBtn.addEventListener('click', verifyPassword);
    
    // 自动聚焦输入框
    passwordInput.focus();
    
    // ========== 粒子背景生成 ==========
    function generateParticles() {
        const container = document.getElementById('particles-zone');
        const particleCount = 60;
        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            const size = Math.random() * 6 + 2;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDuration = Math.random() * 10 + 8 + 's';
            particle.style.animationDelay = Math.random() * 5 + 's';
            particle.style.opacity = Math.random() * 0.5;
            container.appendChild(particle);
        }
    }
    
    // 焦点恢复时重新强化右键防护
    window.addEventListener('focus', () => {
        document.oncontextmenu = function() { return false; };
        document.addEventListener('contextmenu', (e) => e.preventDefault(), { capture: true });
    });
    
    // 启动页面
    generateParticles();
    updateAttemptDisplay();
    
    // iframe 防护
    if (window.self !== window.top) {
        try {
            window.top.location.href = window.location.href;
        } catch(e) {}
    }
</script>

</body>
</html>
